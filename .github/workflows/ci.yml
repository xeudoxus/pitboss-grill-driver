name: CI - Build & Test
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  lua-tests:
    name: Lua 5.3 Unit Tests
    runs-on: windows-latest
    continue-on-error: false
    strategy:
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install Lua 5.3
        shell: pwsh
        run: |
          choco install lua53 -y
          # Wait a moment for installation to complete
          Start-Sleep -Seconds 2
          
          # Multiple approaches to find and set up Lua
          $lua = $null
          
          # Method 1: Try direct path check
          $directPath = "C:\ProgramData\chocolatey\lib\lua53\tools\lua.exe"
          if (Test-Path $directPath) {
            $lua = $directPath
            Write-Host "Found Lua at direct path: $lua"
          }
          
          # Method 2: Refresh environment and try Get-Command
          if (-not $lua) {
            $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH","User")
            $luaCmd = Get-Command lua.exe -ErrorAction SilentlyContinue
            if ($luaCmd) {
              $lua = $luaCmd.Source
              Write-Host "Found Lua via Get-Command: $lua"
            }
          }
          
          # Method 3: Search Chocolatey directories
          if (-not $lua) {
            $searchPaths = @(
              "C:\ProgramData\chocolatey\lib\lua53\tools",
              "$env:ChocolateyInstall\lib\lua53\tools"
            )
            foreach ($path in $searchPaths) {
              if ($path -and (Test-Path $path)) {
                $luaExe = Get-ChildItem -Path $path -Name "lua.exe" -ErrorAction SilentlyContinue
                if ($luaExe) {
                  $lua = Join-Path $path $luaExe
                  Write-Host "Found Lua via search: $lua"
                  break
                }
              }
            }
          }
          
          # Verify we found Lua and add to PATH
          if (-not $lua -or -not (Test-Path $lua)) {
            Write-Host "Available files in Chocolatey lib:"
            Get-ChildItem "C:\ProgramData\chocolatey\lib\lua53" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            throw 'Lua executable not found after installation'
          }
          
          # Add Lua directory to PATH for subsequent steps
          $luaDir = Split-Path $lua -Parent
          $env:PATH += ";$luaDir"
          
          # Test Lua
          Write-Host "Testing Lua at: $lua"
          & $lua -v
      - name: Add stub smartthings CLI (CI-safe)
        shell: pwsh
        run: |
          $tools = Join-Path $env:GITHUB_WORKSPACE 'tools'
          New-Item -ItemType Directory -Path $tools -Force | Out-Null
          $cmdPath = Join-Path $tools 'smartthings.cmd'
          Set-Content -Path $cmdPath -Value '@echo off' -NoNewline -Encoding ASCII
          Add-Content -Path $cmdPath -Value 'echo {"driverId":"ci-driver","name":"CI Driver","version":"ci","packageKey":"ci"}' -Encoding ASCII
          Add-Content -Path $env:GITHUB_PATH -Value $tools
      - name: Run Lua unit tests
        shell: pwsh
        run: |
          lua tests/runner.lua
  build-and-pwsh-tests:
    name: PowerShell Tests & Package
    runs-on: windows-latest
    continue-on-error: false
    strategy:
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      # PowerShell is pre-installed on windows-latest runners; no setup required
      - name: Install Lua 5.3 (for test.ps1)
        shell: pwsh
        run: |
          choco install lua53 -y
          # Refresh environment variables to pick up new PATH
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH","User")
          # Find lua executable dynamically
          $lua = Get-Command lua.exe -ErrorAction SilentlyContinue
          if (-not $lua) {
            # Search in common Chocolatey installation paths
            $chocoLib = if ($env:ChocolateyInstall) { "$env:ChocolateyInstall\lib\lua53\tools" } else { "C:\ProgramData\chocolatey\lib\lua53\tools" }
            $lua = Get-ChildItem -Path $chocoLib -Name "lua.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($lua) {
              $lua = Join-Path $chocoLib $lua
              $env:PATH += ";$chocoLib"
            }
          }
          if (-not $lua) { throw 'Lua executable not found after installation' }
          & $lua -v
      - name: Add stub smartthings CLI (CI-safe)
        shell: pwsh
        run: |
          $tools = Join-Path $env:GITHUB_WORKSPACE 'tools'
          New-Item -ItemType Directory -Path $tools -Force | Out-Null
          $cmdPath = Join-Path $tools 'smartthings.cmd'
          Set-Content -Path $cmdPath -Value '@echo off' -NoNewline -Encoding ASCII
          Add-Content -Path $cmdPath -Value 'echo {"driverId":"ci-driver","name":"CI Driver","version":"ci","packageKey":"ci"}' -Encoding ASCII
          Add-Content -Path $env:GITHUB_PATH -Value $tools
      - name: Run PowerShell tests
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\test.ps1
      - name: Run package-only build (AutoRestore)
        shell: pwsh
        run: pwsh -NoProfile -ExecutionPolicy Bypass -File .\build.ps1 -PackageOnly -y
      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: packaged-driver
          path: |
            ./out/
            ./*.zip