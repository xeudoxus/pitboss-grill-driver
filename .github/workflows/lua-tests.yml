name: Lua Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Lua 5.3 tests (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Lua 5.3 (choco)
        shell: pwsh
        run: |
          choco install lua53 -y
          Start-Sleep -Seconds 3

          # Candidate locations
          $candidates = @(
            'C:\ProgramData\chocolatey\lib\lua53\tools\lua.exe',
            "$env:ChocolateyInstall\lib\lua53\tools\lua.exe"
          )

          $lua = $null
          foreach ($c in $candidates) { if (Test-Path $c) { $lua = $c; break } }

          if (-not $lua) {
            $env:PATH = [System.Environment]::GetEnvironmentVariable('PATH','Machine') + ';' + [System.Environment]::GetEnvironmentVariable('PATH','User')
            $luaCmd = Get-Command lua.exe -ErrorAction SilentlyContinue
            if ($luaCmd) { $lua = $luaCmd.Source }
          }

          if (-not $lua) {
            $searchRoot = if ($env:ChocolateyInstall) { Join-Path $env:ChocolateyInstall 'lib\lua53\tools' } else { 'C:\ProgramData\chocolatey\lib\lua53\tools' }
            $found = Get-ChildItem -Path $searchRoot -Filter lua.exe -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($found) { $lua = $found.FullName }
          }

          if (-not $lua -or -not (Test-Path $lua)) {
            Get-ChildItem 'C:\ProgramData\chocolatey\lib\lua53' -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
            throw 'Lua executable not found after installation'
          }

          $luaDir = Split-Path $lua -Parent
          Add-Content -Path $env:GITHUB_PATH -Value $luaDir

          & $lua -v

      - name: Run tests
        shell: pwsh
        run: |
          $root = "$env:GITHUB_WORKSPACE"
          $runner = Join-Path $root 'tests/runner.lua'
          # Use lua from PATH (should be available after setup step)
          $lua = Get-Command lua.exe -ErrorAction SilentlyContinue
          if (-not $lua) { 
            throw 'Lua executable not found in PATH. Setup step may have failed.' 
          }
          & $lua.Source "$runner"