name: Lua Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Run Lua 5.3 tests (Windows)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Lua 5.3 (choco)
        shell: pwsh
        run: |
          choco install lua53 -y
          # Refresh environment variables to pick up new PATH
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH","User")
          # Find lua executable dynamically
          $lua = Get-Command lua.exe -ErrorAction SilentlyContinue
          if (-not $lua) {
            # Search in common Chocolatey installation paths
            $chocoLib = $env:ChocolateyInstall + "\lib\lua53\tools"
            if (-not $chocoLib) { $chocoLib = "C:\ProgramData\chocolatey\lib\lua53\tools" }
            $lua = Get-ChildItem -Path $chocoLib -Name "lua.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object -First 1
            if ($lua) {
              $lua = Join-Path $chocoLib $lua
              $env:PATH += ";$chocoLib"
            }
          }
          if (-not $lua) { throw 'Lua executable not found after installation' }
          & $lua -v

      - name: Run tests
        shell: pwsh
        run: |
          $root = "$env:GITHUB_WORKSPACE"
          $runner = Join-Path $root 'tests/runner.lua'
          # Use lua from PATH (should be available after setup step)
          $lua = Get-Command lua.exe -ErrorAction SilentlyContinue
          if (-not $lua) { 
            throw 'Lua executable not found in PATH. Setup step may have failed.' 
          }
          & $lua.Source "$runner"