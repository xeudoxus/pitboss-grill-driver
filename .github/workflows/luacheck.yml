name: Luacheck

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential lua5.3 liblua5.3-dev luarocks

      - name: Install luafilesystem and luacheck
        run: |
          set -e
          if ! luarocks install luafilesystem 1.8.0-1; then
            luarocks install luafilesystem || true
          fi
          if ! luarocks install luacheck; then
            echo 'luacheck install failed; printing luarocks list for debug:'
            luarocks list
            exit 1
          fi

      - name: Run luacheck
        run: |
          echo 'Running luacheck...'
          luacheck src tests
