name: Luacheck

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  luacheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential lua5.1 liblua5.1-dev luarocks

      - name: Install luafilesystem and luacheck
        run: |
          luarocks install luafilesystem 1.8.0-1 || luarocks install luafilesystem
          luarocks install luacheck || true

      - name: Run luacheck
        run: |
          if command -v luacheck >/dev/null 2>&1; then
            echo 'Running luacheck...'
            luacheck src tests || true
          else
            echo 'luacheck not installed; check earlier steps for errors.'
            exit 1
          fi
