name: CI - Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
      fail-fast: false
    concurrency:
      group: ci-tests-${{ github.ref }}
      cancel-in-progress: false
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Run tests
      shell: pwsh
      run: |
        pwsh -NoProfile -Command "$PSVersionTable.PSVersion | Out-String | Write-Host"
        pwsh -NoProfile -Command "./test.ps1 | Out-File -FilePath test-output.txt -Encoding utf8; if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }"
    - name: Upload test output
      uses: actions/upload-artifact@v4
      with:
        name: test-output
        path: test-output.txt
